<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>详情页 - 积分可视化系统</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- 自定义样式 -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* ========= 立体气泡核心样式 ========= */
        .bubble-particle {
            position: absolute;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #1f2d35;
            font-family: "Microsoft YaHei", "Segoe UI", system-ui, sans-serif;
            font-weight: 800;
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1), 
                        box-shadow 0.3s ease,
                        filter 0.2s ease;
            box-shadow: 0 12px 22px -8px rgba(0, 0, 0, 0.2),
                        0 2px 4px rgba(0, 0, 0, 0.02),
                        inset 0 1px 0 rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(0px);
            z-index: 10;
            will-change: left, top, transform;
            backface-visibility: hidden;
            letter-spacing: 1px;
            text-shadow: 0 1px 2px rgba(255, 255, 255, 0.4);
            white-space: normal;
            word-break: break-word;
            padding: 0 10px;
            line-height: 1.3;
        }

        .bubble-particle:hover {
            transform: scale(1.1) !important;
            box-shadow: 0 20px 32px -12px rgba(0, 0, 0, 0.3),
                        0 4px 8px rgba(0, 0, 0, 0.05),
                        inset 0 1px 1px rgba(255, 255, 255, 0.8);
            filter: brightness(1.02) saturate(1.05);
            z-index: 100 !important;
        }

        .clickable {
            cursor: pointer;
        }

        .bg-dot {
            pointer-events: none;
            z-index: 1;
            border-radius: 50% !important;
            aspect-ratio: 1 / 1 !important;
            transition: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            background: radial-gradient(circle at 30% 35%, rgba(255,255,240,0.5), rgba(0,0,0,0.08));
            text-shadow: none;
            font-weight: normal;
            white-space: nowrap;
            padding: 0;
        }
        .bg-dot:hover {
            transform: none !important;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05) !important;
            filter: none;
        }

        .particle-garden {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8ed 100%);
            border-radius: 16px;
            cursor: default;
            user-select: none;
        }

        .particle-canvas {
            width: 100%;
            height: 100%;
            position: relative;
        }
    </style>
</head>
<body class="detail-page">
    <!-- 头部导航 -->
    <div class="detail-header">
        <div class="header-content">
            <h1 class="detail-title">详情页</h1>
            <div class="header-buttons">
                <a href="chart.html" class="btn btn-outline-primary">返回图表</a>
                <a href="index.html" class="btn btn-primary">返回首页</a>
            </div>
        </div>
    </div>
        
        <!-- 详情信息卡片 -->
        <div class="detail-info-card">
            <div class="card-header">
                <h3 id="detail-title">加载中...</h3>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-6">
                        <div class="stat-item">
                            <div class="stat-icon">🏆</div>
                            <div class="stat-content">
                                <div class="stat-value" id="total-score">0</div>
                                <div class="stat-label">总积分</div>
                            </div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-icon">📋</div>
                            <div class="stat-content">
                                <div class="stat-value" id="task-count">0</div>
                                <div class="stat-label">参与任务数</div>
                            </div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-icon">📦</div>
                            <div class="stat-content">
                                <div class="stat-value" id="product-count">0</div>
                                <div class="stat-label">参与产品数</div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div id="detail-info" class="detail-description">
                            加载中...
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 产品详情气泡图区域 -->
        <div class="detail-bubble-card" id="product-bubble-section" style="display: none;">
            <div class="card-header">
                <h3>产品人员分布</h3>
            </div>
            <div class="card-body">
                <div class="chart-container" style="height: 500px; padding: 0;">
                    <div id="wp-particle-garden-detail" class="particle-garden" style="border-radius: 16px;">
                        <div id="particle-canvas-detail" class="particle-canvas"></div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 图表区域 -->
        <div class="detail-chart-card">
            <div class="card-header">
                <h3>数据统计</h3>
            </div>
            <div class="card-body">
                <div class="row">
                    <div class="col-md-6">
                        <h4>积分分布</h4>
                        <div class="chart-wrapper">
                            <canvas id="score-distribution-chart"></canvas>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <h4>任务类型分布</h4>
                        <div class="chart-wrapper">
                            <canvas id="task-distribution-chart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 详细记录表格 -->
        <div class="detail-table-card">
            <div class="card-header">
                <h3>详细积分记录</h3>
            </div>
            <div class="card-body">
                <div class="overflow-auto">
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>产品</th>
                                <th>任务</th>
                                <th>积分</th>
                                <th>参与人员</th>
                            </tr>
                        </thead>
                        <tbody id="score-records">
                            <tr>
                                <td colspan="4" class="text-center">加载中...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    
    <!-- JavaScript文件 -->
    <script src="scripts/storage.js"></script>
    <script src="scripts/charts.js"></script>
    <script>
        // 页面加载时获取URL参数并显示详情
        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const type = urlParams.get('type');
            const id = urlParams.get('id');
            
            if (!type || !id) {
                document.getElementById('detail-title').textContent = '参数错误';
                document.getElementById('detail-info').textContent = '请从首页进入详情页';
                return;
            }
            
            // 从本地存储获取数据
            const data = loadData();
            if (!data) {
                document.getElementById('detail-title').textContent = '数据不存在';
                document.getElementById('detail-info').textContent = '请先上传Excel文件';
                return;
            }
            
            let item;
            if (type === 'person') {
                item = data.users.find(user => user.name === id);
                if (item) {
                    displayPersonDetail(item, data);
                }
            } else if (type === 'product') {
                item = data.products.find(product => product.name === id);
                if (item) {
                    displayProductDetail(item, data);
                }
            }
            
            if (!item) {
                document.getElementById('detail-title').textContent = '数据不存在';
                document.getElementById('detail-info').textContent = '未找到对应数据';
            }
        });
        
        // 显示个人详情
        function displayPersonDetail(person, data) {
            document.getElementById('detail-title').textContent = `个人详情 - ${person.name}`;
            document.getElementById('total-score').textContent = person.totalScore.toFixed(2);
            document.getElementById('task-count').textContent = person.tasks.length;
            
            // 计算参与的产品数
            const products = new Set();
            person.tasks.forEach(task => products.add(task.product));
            document.getElementById('product-count').textContent = products.size;
            
            document.getElementById('detail-info').innerHTML = `
                <p>个人积分详情：</p>
                <ul>
                    <li>平均积分：${(person.totalScore / person.tasks.length).toFixed(2)}</li>
                    <li>最高积分任务：${getMaxScoreTask(person.tasks).task}</li>
                    <li>最高积分：${getMaxScoreTask(person.tasks).score.toFixed(2)}</li>
                </ul>
            `;
            
            // 隐藏产品详情气泡图区域
            document.getElementById('product-bubble-section').style.display = 'none';
            
            // 渲染个人详情图表
            renderScoreDistributionChart(person.tasks);
            renderTaskDistributionChart(person.tasks);
            
            // 渲染积分记录表格
            renderScoreRecords(person.tasks, data);
        }
        
        // 显示产品详情
        function displayProductDetail(product, data) {
            document.getElementById('detail-title').textContent = `产品详情 - ${product.name}`;
            document.getElementById('total-score').textContent = product.totalScore.toFixed(2);
            document.getElementById('task-count').textContent = product.tasks.length;
            
            // 计算参与的人数
            const users = new Set();
            product.tasks.forEach(task => {
                task.participants.forEach(participant => users.add(participant));
            });
            document.getElementById('product-count').textContent = users.size;
            
            document.getElementById('detail-info').innerHTML = `
                <p>产品积分详情：</p>
                <ul>
                    <li>平均任务积分：${(product.totalScore / product.tasks.length).toFixed(2)}</li>
                    <li>任务总数：${product.tasks.length}</li>
                    <li>参与人数：${users.size}</li>
                </ul>
            `;
            
            // 显示产品详情气泡图区域
            document.getElementById('product-bubble-section').style.display = 'block';
            
            // 渲染产品详情气泡图
            renderProductDetailBubbleChart(product, data.users);
            
            // 渲染积分分布图表
            renderProductScoreDistributionChart(product, data);
            
            // 渲染任务分布图表
            renderProductTaskDistributionChart(product);
            
            // 渲染积分记录表格
            renderProductScoreRecords(product, data);
        }
        
        // 获取最高积分任务
        function getMaxScoreTask(tasks) {
            return tasks.reduce((max, task) => task.score > max.score ? task : max, tasks[0]);
        }
        
        // 渲染积分分布图表
        function renderScoreDistributionChart(tasks) {
            const ctx = document.getElementById('score-distribution-chart').getContext('2d');
            
            const productScores = {};
            tasks.forEach(task => {
                if (!productScores[task.product]) {
                    productScores[task.product] = 0;
                }
                productScores[task.product] += task.score;
            });
            
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: Object.keys(productScores),
                    datasets: [{
                        label: '积分',
                        data: Object.values(productScores),
                        backgroundColor: 'rgba(54, 162, 235, 0.6)',
                        borderColor: 'rgba(54, 162, 235, 1)',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            title: {
                                display: true,
                                text: '积分'
                            }
                        }
                    }
                }
            });
        }
        
        // 渲染任务分布图表
        function renderTaskDistributionChart(tasks) {
            const ctx = document.getElementById('task-distribution-chart').getContext('2d');
            
            const taskCounts = {};
            tasks.forEach(task => {
                const taskName = task.task;
                if (!taskCounts[taskName]) {
                    taskCounts[taskName] = 0;
                }
                taskCounts[taskName]++;
            });
            
            new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: Object.keys(taskCounts),
                    datasets: [{
                        data: Object.values(taskCounts),
                        backgroundColor: [
                            'rgba(255, 99, 132, 0.6)',
                            'rgba(54, 162, 235, 0.6)',
                            'rgba(255, 206, 86, 0.6)',
                            'rgba(75, 192, 192, 0.6)',
                            'rgba(153, 102, 255, 0.6)'
                        ],
                        borderColor: [
                            'rgba(255, 99, 132, 1)',
                            'rgba(54, 162, 235, 1)',
                            'rgba(255, 206, 86, 1)',
                            'rgba(75, 192, 192, 1)',
                            'rgba(153, 102, 255, 1)'
                        ],
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false
                }
            });
        }
        
        // 渲染产品积分分布图表
        function renderProductScoreDistributionChart(product, data) {
            const ctx = document.getElementById('score-distribution-chart').getContext('2d');
            
            const userScores = {};
            product.tasks.forEach(task => {
                const perPersonScore = task.score / task.participants.length;
                task.participants.forEach(participant => {
                    if (!userScores[participant]) {
                        userScores[participant] = 0;
                    }
                    userScores[participant] += perPersonScore;
                });
            });
            
            new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: Object.keys(userScores),
                    datasets: [{
                        label: '积分',
                        data: Object.values(userScores),
                        backgroundColor: 'rgba(255, 99, 132, 0.6)',
                        borderColor: 'rgba(255, 99, 132, 1)',
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        y: {
                            beginAtZero: true,
                            title: {
                                display: true,
                                text: '积分'
                            }
                        }
                    }
                }
            });
        }
        
        // 渲染产品任务分布图表
        function renderProductTaskDistributionChart(product) {
            const ctx = document.getElementById('task-distribution-chart').getContext('2d');
            
            const taskScores = product.tasks.map(task => ({
                name: task.name,
                score: task.score
            }));
            
            new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: taskScores.map(task => task.name),
                    datasets: [{
                        data: taskScores.map(task => task.score),
                        backgroundColor: [
                            'rgba(255, 99, 132, 0.6)',
                            'rgba(54, 162, 235, 0.6)',
                            'rgba(255, 206, 86, 0.6)',
                            'rgba(75, 192, 192, 0.6)',
                            'rgba(153, 102, 255, 0.6)'
                        ],
                        borderColor: [
                            'rgba(255, 99, 132, 1)',
                            'rgba(54, 162, 235, 1)',
                            'rgba(255, 206, 86, 1)',
                            'rgba(75, 192, 192, 1)',
                            'rgba(153, 102, 255, 1)'
                        ],
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false
                }
            });
        }
        
        // 渲染个人积分记录表格
        function renderScoreRecords(tasks, data) {
            const tbody = document.getElementById('score-records');
            tbody.innerHTML = '';
            
            tasks.forEach(task => {
                const tr = document.createElement('tr');
                
                // 查找任务的完整信息（包括参与人员）
                let fullTask = null;
                for (const product of data.products) {
                    const foundTask = product.tasks.find(t => t.name === task.task && product.name === task.product);
                    if (foundTask) {
                        fullTask = foundTask;
                        break;
                    }
                }
                
                tr.innerHTML = `
                    <td>${task.product}</td>
                    <td>${task.task}</td>
                    <td>${task.score.toFixed(2)}</td>
                    <td>${fullTask ? fullTask.participants.join(', ') : '-'}</td>
                `;
                tbody.appendChild(tr);
            });
        }
        
        // 渲染产品积分记录表格
        function renderProductScoreRecords(product, data) {
            const tbody = document.getElementById('score-records');
            tbody.innerHTML = '';
            
            product.tasks.forEach(task => {
                const perPersonScore = task.score / task.participants.length;
                
                task.participants.forEach(participant => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${product.name}</td>
                        <td>${task.name}</td>
                        <td>${perPersonScore.toFixed(2)}</td>
                        <td>${task.participants.join(', ')}</td>
                    `;
                    tbody.appendChild(tr);
                });
            });
        }
    </script>
</body>
</html>
