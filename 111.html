<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>粒子花园 - 材料星系 | 立体球体质感 | 多图弹窗</title>
    <style>
        /* ========= 立体气泡核心样式 ========= */
        .bubble-particle {
            position: absolute;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #1f2d35;
            font-family: "Microsoft YaHei", "Segoe UI", system-ui, sans-serif;
            font-weight: 600;
            transition: transform 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1), 
                        box-shadow 0.3s ease,
                        filter 0.2s ease;
            box-shadow: 0 12px 22px -8px rgba(0, 0, 0, 0.2),
                        0 2px 4px rgba(0, 0, 0, 0.02),
                        inset 0 1px 0 rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(0px);
            z-index: 10;
            will-change: left, top, transform;
            backface-visibility: hidden;
            letter-spacing: 1px;
            text-shadow: 0 1px 2px rgba(255, 255, 255, 0.4);
            /* 允许文字自动换行，解决长文本字号过小问题 */
            white-space: normal;
            word-break: break-word;
            padding: 0 10px;
            line-height: 1.3;
        }

        /* 悬停时：更强烈的立体感 + 微微浮起 */
        .bubble-particle:hover {
            transform: scale(1.1) !important;
            box-shadow: 0 20px 32px -12px rgba(0, 0, 0, 0.3),
                        0 4px 8px rgba(0, 0, 0, 0.05),
                        inset 0 1px 1px rgba(255, 255, 255, 0.8);
            filter: brightness(1.02) saturate(1.05);
            z-index: 100 !important;
        }

        /* 点击手势 */
        .clickable {
            cursor: pointer;
        }

        /* 背景小点：保持简约扁平，不干扰主视觉 */
        .bg-dot {
            pointer-events: none;
            z-index: 1;
            border-radius: 50% !important;
            aspect-ratio: 1 / 1 !important;
            transition: none;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            background: radial-gradient(circle at 30% 35%, rgba(255,255,240,0.5), rgba(0,0,0,0.08));
            text-shadow: none;
            font-weight: normal;
            white-space: nowrap; /* 背景点无文字，无需换行 */
            padding: 0;
        }
        .bg-dot:hover {
            transform: none !important;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05) !important;
            filter: none;
        }

        /* ========= 多图模态框样式（垂直滚动，优雅动画） ========= */
        .image-modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.78);
            backdrop-filter: blur(8px);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Microsoft YaHei", sans-serif;
        }
        .image-modal-container {
            width: 90%;
            max-width: 800px;
            background: #ffffff;
            border-radius: 36px;
            box-shadow: 0 30px 50px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            animation: modalFadeIn 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            max-height: 85vh;
            display: flex;
            flex-direction: column;
        }
        @keyframes modalFadeIn {
            from {
                opacity: 0;
                transform: scale(0.94) translateY(18px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        .modal-header {
            background: #ffffff;
            padding: 20px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #f2e8da;
            flex-shrink: 0;
        }
        .modal-title {
            font-size: 1.65rem;
            font-weight: 600;
            color: #1e2f3a;
            margin: 0;
            letter-spacing: -0.2px;
        }
        .close-modal-btn {
            background: transparent;
            border: none;
            font-size: 30px;
            font-weight: 300;
            width: 42px;
            height: 42px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #8e9eaf;
            transition: all 0.2s;
        }
        .close-modal-btn:hover {
            background: #f0f2f5;
            color: #2c3e4e;
        }

        /* 可滚动内容区域 */
        .modal-body {
            padding: 24px;
            background: #fefaf5;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
            flex: 1;
            scroll-behavior: smooth;
        }

        /* 图片容器 */
        .image-item {
            display: flex;
            justify-content: center;
            width: 100%;
        }

        /* 单张图片样式，圆润细腻 */
        .material-image {
            max-width: 100%;
            max-height: 58vh;
            border-radius: 28px;
            box-shadow: 0 12px 24px rgba(0,0,0,0.12);
            object-fit: contain;
            background: #ffffff;
            transition: transform 0.2s ease;
        }
        .material-image:hover {
            transform: scale(1.01);
        }

        /* 占位符 */
        .placeholder-note {
            background: #f8f9fc;
            border-radius: 32px;
            padding: 48px 32px;
            text-align: center;
            color: #7c8b8f;
            font-size: 1rem;
            border: 1px solid #edeae2;
        }

        /* 底部关闭按钮区域 */
        .modal-footer {
            padding: 14px 24px;
            text-align: center;
            border-top: 1px solid #efe6db;
            background: #ffffff;
            flex-shrink: 0;
        }
        .btn-close-modal {
            background: #eef2f5;
            border: none;
            padding: 10px 36px;
            border-radius: 60px;
            font-weight: 500;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.2s;
            color: #1e2f3a;
        }
        .btn-close-modal:hover {
            background: #e2e8ed;
            transform: scale(0.97);
        }

        @media (max-width: 600px) {
            .modal-title { font-size: 1.3rem; }
            .modal-body { padding: 18px; gap: 18px; }
            .modal-header { padding: 14px 18px; }
            .material-image { border-radius: 20px; }
            .bubble-particle { font-size: 12px; letter-spacing: 0; padding: 0 6px; }
        }
    </style>
</head>
<body style="margin:0; padding:0; background:#f5f5f5;">
<div id="wp-particle-garden" style="width: 100%; height: 850px; position: relative; overflow: hidden; background: #ffffff; cursor: default; user-select: none; border: 1px solid #f0ece4; box-shadow: 0 2px 12px rgba(0,0,0,0.02);">
    <div style="width: 100%; height: 90px; position: absolute; top: 0; left: 0; z-index: 5; pointer-events: none;"></div>
    <div id="particle-canvas" style="width: 100%; height: 100%; position: relative;"></div>
</div>

<script>
(function() {
    const container = document.getElementById('wp-particle-garden');
    const canvas = document.getElementById('particle-canvas');
    const TOP_MARGIN = 90;

    // ========= 电池材料数据（支持多图） =========
    const mainData = [
        { text: '磷酸铁锂', size: 180, color: '#FFD966', level: 0, 
          images: ['https://www.sophonx.cn/wp-content/uploads/2026/03/lfp.png'] },
        { text: '高压钴酸锂', size: 178, color: '#4FC3F7', level: 1, 
          images: ['https://www.sophonx.cn/wp-content/uploads/2026/03/lithium-cobalt-oxide.png'] },
        { text: '高镍三元', size: 155, color: '#9CCC65', level: 1, 
          images: ['https://www.sophonx.cn/wp-content/uploads/2026/03/nca.png'] },
        { text: '钠离子层状氧化物', size: 152, color: '#C5E1A5', level: 1, 
          images: ['https://www.sophonx.cn/wp-content/uploads/2026/03/钠离子层状氧化物.png'] },
        { text: '硅碳', size: 180, color: '#D483FF', level: 1, 
          images: ['https://www.sophonx.cn/wp-content/uploads/2026/03/硅碳（一）.png',
                   'https://www.sophonx.cn/wp-content/uploads/2026/03/硅碳（二）.png',
                   'https://www.sophonx.cn/wp-content/uploads/2026/03/硅碳（三）.png'] },
        { text: '石墨', size: 140, color: '#FFF176', level: 2, 
          images: ['https://www.sophonx.cn/wp-content/uploads/2026/03/石墨（一）.png',
                   'https://www.sophonx.cn/wp-content/uploads/2026/03/石墨（二）.png'] },
        { text: '硫化锂', size: 115, color: '#AEE001', level: 2, images: [] },
        { text: '富锂铁酸锂', size: 108, color: '#88C9F4', level: 2, images: [] },
        { text: '多孔碳', size: 105, color: '#FF82BE', level: 2, images: [] },
        { text: '磷酸铁钠', size: 98, color: '#81C784', level: 2, images: [] },
        { text: '粉体银', size: 110, color: '#0097A7', level: 2, images: [] },
        { text: '氧化铝', size: 96, color: '#4DD6AC', level: 2, images: [] },
        { text: '氧化硅', size: 104, color: '#6682ED', level: 2, images: [] },
        { text: '钛酸钡', size: 102, color: '#FF8A65', level: 2, images: [] },
        { text: '粉体铜', size: 92, color: '#D4AF37', level: 2, images: [] },
        { text: '粉体银包铜', size: 92, color: '#E4AF37', level: 2, images: [] },
        { text: '氮化铝', size: 92, color: '#44AF37', level: 2, images: [] }
    ];

    const bgDotsCount = 160;       
    const dotColors = ['#f44336', '#9c27b0', '#2196f3', '#4caf50', '#ffeb3b', '#ff9800', '#00bcd4', '#e91e63', '#ff6d00', '#3f51b5'];
    
    let particles = [];          
    let mainParticles = [];      
    
    // 物理参数：完全弹性，增强碰撞迭代使运动丝滑无停顿
    const BOUNCE_E = 1.0;            
    const COLLISION_ITER = 6;        
    const MAX_DT = 0.025;            
    
    // 舒缓速度设定
    const MAIN_SPEED_RANGE = 38;     
    const BG_SPEED_RANGE = 55;       
    
    // 图片预加载缓存
    const imageCache = {};
    function preloadImage(url) {
        if (!url || imageCache[url]) return;
        const img = new Image();
        img.src = url;
        imageCache[url] = img;
    }
    
    function preloadAllImages(item) {
        if (item.images && item.images.length) {
            item.images.forEach(url => { if (url) preloadImage(url); });
        }
    }
    
    // ---------- 立体球体渐变生成器 ----------
    function generateSphereGradient(baseColor) {
        return `radial-gradient(circle at 28% 30%, rgba(255, 255, 245, 0.85), ${baseColor} 55%, rgba(0, 0, 0, 0.18) 98%)`;
    }
    
    // ---------- 智能字体计算：短文本单行大字号，长文本换行后使用舒适字号 ----------
    function getOptimalFontSize(text, bubbleSize) {
        if (!text || text.length === 0) return Math.max(14, bubbleSize / 5);
        const textLen = text.length;
        // 阈值：超过8个字符则允许换行，字号可以显著增大（因为换行后每行字符数减半）
        if (textLen >= 8) {
            // 换行模式：基础字号取直径的 22%，并限制最大 26px，最小 16px
            let fontSize = Math.min(26, Math.max(16, bubbleSize * 0.22));
            // 对于极长文本（>12字符），再适当微调
            if (textLen > 12) fontSize = Math.max(14, fontSize * 0.9);
            return fontSize;
        } else {
            // 短文本：单行显示，使用直径的 20%，但不超过 32px，不低于 14px
            let fontSize = Math.min(32, Math.max(14, bubbleSize * 0.2));
            return fontSize;
        }
    }
    
    // ---------- 模态框管理 (多图垂直滚动) ----------
    let currentModal = null;
    function closeModal() {
        if (currentModal) {
            currentModal.remove();
            currentModal = null;
            document.body.style.overflow = '';
        }
    }
    
    function openMaterialModal(item) {
        if (currentModal) closeModal();
        const images = item.images && item.images.length ? item.images : [];
        images.forEach(url => preloadImage(url));
        
        const modalOverlay = document.createElement('div');
        modalOverlay.className = 'image-modal-overlay';
        modalOverlay.innerHTML = `
            <div class="image-modal-container">
                <div class="modal-header">
                    <h3 class="modal-title">${escapeHtml(item.text)}</h3>
                    <button class="close-modal-btn" id="modalCloseBtn">✕</button>
                </div>
                <div class="modal-body" id="modalBodyContent"></div>
                <div class="modal-footer">
                    <button class="btn-close-modal" id="modalCloseFooter">关 闭</button>
                </div>
            </div>
        `;
        document.body.appendChild(modalOverlay);
        currentModal = modalOverlay;
        document.body.style.overflow = 'hidden';
        
        const closeHandler = () => closeModal();
        modalOverlay.querySelector('#modalCloseBtn').addEventListener('click', closeHandler);
        modalOverlay.querySelector('#modalCloseFooter').addEventListener('click', closeHandler);
        modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) closeHandler(); });
        
        const bodyDiv = modalOverlay.querySelector('#modalBodyContent');
        if (images.length === 0) {
            bodyDiv.innerHTML = `<div class="placeholder-note">即将补充影像资料，敬请期待</div>`;
            return;
        }
        let imagesHtml = '';
        images.forEach(imgUrl => {
            imagesHtml += `
                <div class="image-item">
                    <img class="material-image" src="${escapeHtml(imgUrl)}" loading="lazy" alt="${escapeHtml(item.text)}" />
                </div>
            `;
        });
        bodyDiv.innerHTML = imagesHtml;
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // ---------- 高效的碰撞响应 (等质量，完全弹性) ----------
    function handleMainCollision(p1, p2) {
        const dx = p1.x - p2.x;
        const dy = p1.y - p2.y;
        const dist = Math.hypot(dx, dy);
        const minDist = p1.r + p2.r;
        if (dist < minDist) {
            const overlap = minDist - dist;
            const nx = dx / dist;
            const ny = dy / dist;
            const correction = overlap * 0.5;
            p1.x += nx * correction;
            p1.y += ny * correction;
            p2.x -= nx * correction;
            p2.y -= ny * correction;
            
            const vrelx = p1.vx - p2.vx;
            const vrely = p1.vy - p2.vy;
            const vrel_n = vrelx * nx + vrely * ny;
            if (vrel_n < 0) {
                const imp = (1 + BOUNCE_E) * vrel_n / 2;
                p1.vx -= imp * nx;
                p1.vy -= imp * ny;
                p2.vx += imp * nx;
                p2.vy += imp * ny;
            }
        }
    }
    
    function applyBoundary(p, bounds) {
        const leftBound = 0;
        const rightBound = bounds.width - p.size;
        const topBound = bounds.topMargin;
        const bottomBound = bounds.height - p.size;
        
        if (p.x < leftBound) {
            p.x = leftBound;
            p.vx = Math.abs(p.vx);
        } else if (p.x > rightBound) {
            p.x = rightBound;
            p.vx = -Math.abs(p.vx);
        }
        
        if (p.y < topBound) {
            p.y = topBound;
            p.vy = Math.abs(p.vy);
        } else if (p.y > bottomBound) {
            p.y = bottomBound;
            p.vy = -Math.abs(p.vy);
        }
    }
    
    // ---------- 基于时间步长的动画引擎 (Delta Time) ----------
    let lastTimestamp = null;
    
    function animate(currentTime) {
        if (!lastTimestamp) {
            lastTimestamp = currentTime;
            requestAnimationFrame(animate);
            return;
        }
        
        let dt = Math.min(MAX_DT, (currentTime - lastTimestamp) / 1000);
        if (dt <= 0) {
            requestAnimationFrame(animate);
            lastTimestamp = currentTime;
            return;
        }
        
        const rect = container.getBoundingClientRect();
        if (rect.width === 0 || rect.height === 0) {
            requestAnimationFrame(animate);
            return;
        }
        
        const bounds = {
            width: rect.width,
            height: rect.height,
            topMargin: TOP_MARGIN
        };
        
        for (let p of particles) {
            p.x += p.vx * dt;
            p.y += p.vy * dt;
        }
        
        for (let iter = 0; iter < COLLISION_ITER; iter++) {
            for (let i = 0; i < mainParticles.length; i++) {
                for (let j = i + 1; j < mainParticles.length; j++) {
                    handleMainCollision(mainParticles[i], mainParticles[j]);
                }
            }
            for (let p of mainParticles) {
                applyBoundary(p, bounds);
            }
        }
        
        for (let p of particles) {
            if (!p.isMain) {
                applyBoundary(p, bounds);
            }
        }
        
        for (let p of particles) {
            p.el.style.left = p.x + 'px';
            p.el.style.top = p.y + 'px';
        }
        
        lastTimestamp = currentTime;
        requestAnimationFrame(animate);
    }
    
    // ---------- 初始化粒子系统 (立体球体样式 + 舒适换行 + 智能字号) ----------
    function init() {
        const rect = container.getBoundingClientRect();
        const centerX = rect.width / 2;
        const centerY = (rect.height - TOP_MARGIN) / 2 + TOP_MARGIN;
        
        canvas.innerHTML = '';
        particles = [];
        mainParticles = [];
        
        // 创建主气泡 (材料星系) —— 立体球体质感 + 换行友好字号
        mainData.forEach((item, idx) => {
            const div = document.createElement('div');
            div.className = 'bubble-particle clickable';
            const size = item.size;
            
            // 初始布局: 根据 level 形成环绕层级
            let angle = (idx / mainData.length) * Math.PI * 2;
            let radius = item.level === 0 ? 0 : (item.level === 1 ? 150 : 260);
            radius += (Math.random() - 0.5) * 45;
            
            let x = centerX + Math.cos(angle) * radius - size / 2;
            let y = centerY + Math.sin(angle) * radius - size / 2;
            
            x = Math.min(Math.max(x, 5), rect.width - size - 5);
            y = Math.min(Math.max(y, TOP_MARGIN + 5), rect.height - size - 5);
            
            div.style.width = size + 'px';
            div.style.height = size + 'px';
            div.style.background = generateSphereGradient(item.color);
            div.style.left = x + 'px';
            div.style.top = y + 'px';
            
            // 动态字号（支持换行，长文本字号舒适）
            const optimalFontSize = getOptimalFontSize(item.text, size);
            div.style.fontSize = optimalFontSize + 'px';
            div.innerText = item.text;
            div.style.fontWeight = '600';
            div.style.letterSpacing = '0.8px';
            div.style.textShadow = '0 1px 2px rgba(255,255,245,0.6)';
            
            div.onclick = (e) => {
                e.stopPropagation();
                openMaterialModal(item);
            };
            canvas.appendChild(div);
            
            // 随机速度 (像素/秒)
            const angleSpeed = Math.random() * Math.PI * 2;
            const spdMag = (Math.random() * 0.7 + 0.3) * MAIN_SPEED_RANGE;
            const vx = Math.cos(angleSpeed) * spdMag;
            const vy = Math.sin(angleSpeed) * spdMag;
            
            const particle = {
                el: div,
                x: x,
                y: y,
                vx: vx,
                vy: vy,
                size: size,
                r: size / 2,
                isMain: true
            };
            particles.push(particle);
            mainParticles.push(particle);
            
            preloadAllImages(item);
        });
        
        // 创建背景小点 (轻盈微粒，保留简约半透明质感，不抢主视觉)
        for (let i = 0; i < bgDotsCount; i++) {
            const size = Math.random() * 14 + 4;
            const div = document.createElement('div');
            div.className = 'bubble-particle bg-dot';
            let x = Math.random() * (rect.width - size);
            let y = Math.random() * (rect.height - TOP_MARGIN - size) + TOP_MARGIN;
            
            div.style.width = size + 'px';
            div.style.height = size + 'px';
            const dotColor = dotColors[Math.floor(Math.random() * dotColors.length)];
            div.style.background = `radial-gradient(circle at 35% 35%, rgba(255,255,240,0.7), ${dotColor} 70%, rgba(0,0,0,0.1))`;
            div.style.opacity = Math.random() * 0.55 + 0.25;
            div.style.left = x + 'px';
            div.style.top = y + 'px';
            div.innerText = '';
            div.style.boxShadow = '0 1px 4px rgba(0,0,0,0.05)';
            
            canvas.appendChild(div);
            
            const spdMag = (Math.random() * 0.7 + 0.3) * BG_SPEED_RANGE;
            const dir = Math.random() * Math.PI * 2;
            const vx = Math.cos(dir) * spdMag;
            const vy = Math.sin(dir) * spdMag;
            
            particles.push({
                el: div,
                x: x,
                y: y,
                vx: vx,
                vy: vy,
                size: size,
                r: size / 2,
                isMain: false
            });
        }
        
        // 预碰撞分离迭代，使初始状态更舒适
        for (let iter = 0; iter < 8; iter++) {
            for (let i = 0; i < mainParticles.length; i++) {
                for (let j = i + 1; j < mainParticles.length; j++) {
                    const p1 = mainParticles[i];
                    const p2 = mainParticles[j];
                    const dx = p1.x - p2.x;
                    const dy = p1.y - p2.y;
                    const dist = Math.hypot(dx, dy);
                    const minDist = p1.r + p2.r;
                    if (dist < minDist) {
                        const overlap = minDist - dist;
                        const nx = dx / dist;
                        const ny = dy / dist;
                        const correction = overlap * 0.5;
                        p1.x += nx * correction;
                        p1.y += ny * correction;
                        p2.x -= nx * correction;
                        p2.y -= ny * correction;
                        const boundsTemp = {
                            width: rect.width,
                            height: rect.height,
                            topMargin: TOP_MARGIN
                        };
                        applyBoundary(p1, boundsTemp);
                        applyBoundary(p2, boundsTemp);
                    }
                }
            }
        }
        
        for (let p of particles) {
            p.el.style.left = p.x + 'px';
            p.el.style.top = p.y + 'px';
        }
        
        lastTimestamp = null;
        requestAnimationFrame(animate);
    }
    
    // 窗口尺寸变化时重新初始化布局
    let resizeTimer;
    function handleResize() {
        if (resizeTimer) clearTimeout(resizeTimer);
        resizeTimer = setTimeout(() => {
            if (currentModal) closeModal();
            init();
        }, 180);
    }
    window.addEventListener('resize', handleResize);
    
    setTimeout(init, 80);
})();
</script>
</body>
</html>
