<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>积分可视化系统 - 产品完成度</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- 自定义样式 -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="detail-page">
    <!-- 页面头部导航 -->
    <div class="chart-header">
        <div class="header-left">
            <a href="index.html" class="back-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                <span>返回上传</span>
            </a>
            <h1 class="chart-title">产品完成度统计</h1>
        </div>
        <div class="header-right">
            <button id="to-chart-btn" class="btn btn-outline-secondary reupload-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path>
                </svg>
                查看图表
            </button>
            <button id="reupload-btn" class="btn btn-outline-secondary reupload-btn ms-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <polyline points="23 4 23 10 17 10"></polyline>
                    <polyline points="1 20 1 14 7 14"></polyline>
                    <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                </svg>
                重新上传
            </button>
        </div>
    </div>
    
    <!-- 产品完成度展示 -->
    <div class="detail-bubble-card">
        <div class="card-header">
            <h3>📊 产品完成度列表</h3>
        </div>
        <div class="card-body">
            <div id="completion-content" class="completion-content">
                <!-- 产品完成度将在这里动态生成 -->
            </div>
        </div>
    </div>
    
    <!-- JavaScript文件 -->
    <script src="scripts/storage.js"></script>
    <script src="scripts/app.js"></script>
</body>
</html>
